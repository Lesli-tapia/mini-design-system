<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Design System</title>

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Mini Design System</h1>
      <p>Mi primer sistema visual para interfaces.</p>
    </header>

    <!-- COLORES -->

    <section>
      <h2>Colores</h2>

      <div class="colors">
        <div class="color-card primary">
          <p>Primary</p>
          <span>#f5f1ea</span>
        </div>

        <div class="color-card accent">
          <p>Accent</p>
          <span>#7d5a44</span>
        </div>

        <div class="color-card dark">
          <p>Text</p>
          <span>#4a342a</span>
        </div>

        <div class="color-card light">
          <p>Background</p>
          <span>#f3f4f6</span>
        </div>
      </div>
    </section>

    <!-- TIPOGRAFÍA -->

    <section>
      <h2>Tipografía</h2>

      <h1 class="title-example">Ejemplo de Encabezado</h1>

      <p class="body-example">
        Este es el ejemplo de un párrafo usando la fuente secundaria
      </p>

      <small> Ejemplo de texto pequeño </small>
    </section>

    <!-- BOTÓN -->

    <section>
      <h2>Componente Botón</h2>

      <button class="btn">Haz clic</button>
    </section>
  </body>
</html>
